model = "gpt-5.5"
model_reasoning_effort = "xhigh"
sandbox_mode = "danger-full-access"

tool_output_token_limit = 25000

web_search = "live"

suppress_unstable_features_warning = true

[features]
#undo = false
unified_exec = true
skills = true
shell_snapshot = true

[projects."/home/openclaw"]
trust_level = "trusted"

[projects."/home/openclaw/lodestar"]
trust_level = "trusted"

[projects."/home/openclaw/.openclaw/workspace"]
trust_level = "trusted"

[projects."/tmp"]
trust_level = "trusted"

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[plugins."github@openai-curated"]
enabled = true

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 3
