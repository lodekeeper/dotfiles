# glamsterdam-devnet-0 local repro (fallback on dead checkpointz tag)
# Same as notes/gloas-genesis/kurtosis.yaml, except:
# - checkpointz image switched from bbusa/checkpointz:fix (unpullable on 2026-04-24)
#   to ethpandaops/checkpointz:latest so the core CL/EL devnet can actually launch.

participants_matrix:
  el:
    - el_type: geth
      el_image: ethpandaops/geth:mariusvanderwijden-bal-devnet-4
  cl:
    - cl_type: lodestar
      cl_image: lodestar:gloas-genesis-unstable
  count: 3

network_params:
  gloas_fork_epoch: 0
  preset: minimal
  withdrawal_type: "0x01"
  validator_balance: 40000
  num_validator_keys_per_node: 1000

additional_services:
  - dora
  - assertoor
  - spamoor
  - checkpointz

spamoor_params:
  image: ethpandaops/spamoor:master
  spammers:
    - scenario: eoatx
      config:
        throughput: 100

assertoor_params:
  image: ethpandaops/assertoor:master
  run_stability_check: false
  run_block_proposal_check: false
  tests:
    - {file: "https://raw.githubusercontent.com/ethpandaops/assertoor/refs/heads/master/playbooks/gloas-dev/builder-lifecycle.yaml"}

snooper_enabled: false
global_log_level: debug

port_publisher:
  additional_services:
    enabled: true

dora_params:
  image: ethpandaops/dora:master

checkpointz_params:
  image: ethpandaops/checkpointz:latest
