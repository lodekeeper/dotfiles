participants:
  - el_type: geth
    el_image: ethpandaops/geth:mariusvanderwijden-bal-devnet-4
    cl_type: lodestar
    cl_image: lodestar:gloas-boot
    vc_image: lodestar:gloas-boot
    count: 4

network_params:
  gloas_fork_epoch: 0
  preset: minimal
  withdrawal_type: "0x01"
  validator_balance: 40000
  num_validator_keys_per_node: 1000

additional_services:
  - dora
  - assertoor
  - spamoor

spamoor_params:
  image: ethpandaops/spamoor:master
  spammers:
    - scenario: eoatx
      config:
        throughput: 100

assertoor_params:
  image: ethpandaops/assertoor:master
  run_stability_check: false
  run_block_proposal_check: false
  tests:
    - file: "https://raw.githubusercontent.com/ethpandaops/assertoor/refs/heads/master/playbooks/gloas-dev/builder-lifecycle.yaml"

snooper_enabled: false
global_log_level: debug

port_publisher:
  additional_services:
    enabled: true

dora_params:
  image: ethpandaops/dora:master
